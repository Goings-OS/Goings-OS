version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: goings_os_gateway
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      - APP_ENV=development
      - PORT=5000
      - DB_PATH=/app/data/private_kernel.db
    networks:
      - private_mesh_network
    restart: always

  hermes_core:
    image: nousresearch/hermes-agent:latest
    container_name: hermes_agent_core
    volumes:
      - ./hermes_tools:/app/tools
      - sqlite_data:/app/data
    environment:
      - AGENT_MODE=autonomous
      - STORAGE_BACKEND=sqlite
      - DB_PATH=/app/data/private_kernel.db
    networks:
      - private_mesh_network
    depends_on:
      - gateway
    restart: always

networks:
  private_mesh_network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
