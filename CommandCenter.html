<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOINGS OS | Master Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .grid-bg { background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
    </style>
</head>
<body class="grid-bg h-screen flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [time, setTime] = useState(new Date());
            const [activeTab, setActiveTab] = useState('EXECUTION');
            const [activePillar, setActivePillar] = useState('LAEC');
            const [userRole, setUserRole] = useState('COMMANDER'); 

            // Supreme Clock
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 50);
                return () => clearInterval(timer);
            }, []);
            const formatTime = (date) => {
                const h = String(date.getHours()).padStart(2, '0');
                const m = String(date.getMinutes()).padStart(2, '0');
                const s = String(date.getSeconds()).padStart(2, '0');
                const ms = String(date.getMilliseconds()).padStart(3, '0').substring(0,2);
                return { main: `${h}:${m}:${s}`, ms: ms };
            };
            const clock = formatTime(time);

            // --- THE DYNAMIC FORM COMPONENT ---
            const LAECForm = () => {
                const [isSaving, setIsSaving] = useState(false);
                const [savedHash, setSavedHash] = useState(null);

                // MASTER STATE: This holds the blank data and updates when you type
                const initialFormState = {
                    firstName: '', lastName: '', phone: '', email: '', referral: '',
                    address: '', city: '', state: '', zip: '',
                    description: '', date: '', guests: '',
                    package: '', addons: [], alcohol: '', hookah: '', setup: false
                };
                const [formData, setFormData] = useState(initialFormState);

                const handleChange = (e) => {
                    const { name, value, type, checked } = e.target;
                    setFormData(prev => ({
                        ...prev,
                        [name]: type === 'checkbox' ? checked : value
                    }));
                };

                const handleAddonChange = (e) => {
                    const { value, checked } = e.target;
                    setFormData(prev => {
                        if (checked) return { ...prev, addons: [...prev.addons, value] };
                        return { ...prev, addons: prev.addons.filter(item => item !== value) };
                    });
                };

                const handleFirebaseSave = (e) => {
                    e.preventDefault();
                    setIsSaving(true);
                    
                    // Simulated API Call to Firebase
                    setTimeout(() => {
                        setIsSaving(false);
                        setSavedHash("FB_DOC_" + Math.random().toString(36).substring(2, 15).toUpperCase());
                        
                        // CLEAR THE FORM: Resets to blank for the next client
                        setFormData(initialFormState);
                        
                    }, 1500);
                };

                if (savedHash) {
                    return (
                        <div class="h-full flex flex-col items-center justify-center text-center space-y-6 animate-[zoomIn_0.5s_ease-out]">
                            <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center border-2 border-emerald-500">
                                <i class="fa-solid fa-check text-4xl text-emerald-500"></i>
                            </div>
                            <div>
                                <h2 class="text-3xl font-black text-white uppercase tracking-tighter">Secured in <span class="text-emerald-500">Vault</span></h2>
                                <p class="text-slate-400 mt-2">Data encrypted and cleared from local terminal.</p>
                            </div>
                            <div class="bg-black border border-slate-800 p-4 rounded-xl font-mono text-sm">
                                <span class="text-slate-500 uppercase text-[10px] block mb-1">Firestore Document ID:</span>
                                <span class="text-emerald-500">{savedHash}</span>
                            </div>
                            <button onClick={() => setSavedHash(null)} class="text-amber-500 text-xs font-black uppercase tracking-widest hover:underline mt-4">
                                <i class="fa-solid fa-arrow-left mr-2"></i> Start Fresh Intake
                            </button>
                        </div>
                    );
                }

                return (
                    <form onSubmit={handleFirebaseSave} class="space-y-8 relative z-10 overflow-y-auto h-full pr-4 pb-12">
                        <div class="flex justify-between items-center border-b border-white/10 pb-4 sticky top-0 bg-slate-900/90 backdrop-blur z-20">
                            <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Luxury Affairs <span class="text-amber-500">Intake Engine</span></h2>
                        </div>

                        <div class="space-y-6">
                            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">1. Client Identity</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[9px] uppercase font-bold text-slate-500">First Name *</label><input required name="firstName" value={formData.firstName} onChange={handleChange} type="text" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none transition-colors" /></div>
                                <div><label class="text-[9px] uppercase font-bold text-slate-500">Last Name *</label><input required name="lastName" value={formData.lastName} onChange={handleChange} type="text" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none transition-colors" /></div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[9px] uppercase font-bold text-slate-500">Phone Number *</label><input required name="phone" value={formData.phone} onChange={handleChange} type="tel" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none" /></div>
                                <div><label class="text-[9px] uppercase font-bold text-slate-500">E-mail *</label><input required name="email" value={formData.email} onChange={handleChange} type="email" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none" /></div>
                            </div>
                            <div>
                                <label class="text-[9px] uppercase font-bold text-slate-500 block mb-2">Home Address *</label>
                                <input required name="address" value={formData.address} onChange={handleChange} type="text" placeholder="Street Address" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white mb-2 outline-none" />
                                <div class="grid grid-cols-3 gap-4">
                                    <input required name="city" value={formData.city} onChange={handleChange} type="text" placeholder="City" class="col-span-1 bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none" />
                                    <input required name="state" value={formData.state} onChange={handleChange} type="text" placeholder="State" class="col-span-1 bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none" />
                                    <input required name="zip" value={formData.zip} onChange={handleChange} type="text" placeholder="Zip Code" class="col-span-1 bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none" />
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest border-b border-slate-800 pb-2">2. Event Details</h3>
                            <div><label class="text-[9px] uppercase font-bold text-slate-500">Brief Description *</label><textarea required name="description" value={formData.description} onChange={handleChange} class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white h-20 outline-none"></textarea></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[9px] uppercase font-bold text-slate-500">Desired Date *</label><input required name="date" value={formData.date} onChange={handleChange} type="date" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white text-sm outline-none" /></div>
                                <div><label class="text-[9px] uppercase font-bold text-slate-500">Number of Guests (Max 200) *</label><input required name="guests" value={formData.guests} onChange={handleChange} type="number" class="w-full bg-black border border-slate-800 focus:border-amber-500 p-3 rounded-lg text-white outline-none" /></div>
                            </div>
                            
                            <div>
                                <label class="text-[9px] uppercase font-bold text-slate-500 mb-2 block">Event Time / Package *</label>
                                <div class="space-y-2 bg-black/50 p-4 border border-slate-800 rounded-xl">
                                    {['Weekend - Morning (7AM-3PM) ($1,300)', 'Weekend - Night (4PM-Midnight) ($1,500)', 'Weekend - Entire Day (7AM-Midnight) ($2,000)', 'Weekday (M-Th) $225 Per Hour', '$3000 Weekday Walk-in', '$3500 Weekend Walk-in', '$5700 Weekend Upgraded'].map((pkg, i) => (
                                        <label key={i} class="flex items-center gap-3 cursor-pointer p-2 hover:bg-white/5 rounded transition-colors">
                                            <input required type="radio" name="package" value={pkg} checked={formData.package === pkg} onChange={handleChange} class="accent-amber-500 w-4 h-4" />
                                            <span class="text-xs text-slate-300">{pkg}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <div class="space-y-4 bg-black/50 p-4 border border-slate-800 rounded-xl">
                                <div>
                                    <label class="text-[9px] uppercase font-bold text-slate-500 mb-2 block">Will you be serving Alcohol? *</label>
                                    <label class="flex items-center gap-3 cursor-pointer mb-2"><input required type="radio" name="alcohol" value="ABC" checked={formData.alcohol === 'ABC'} onChange={handleChange} class="accent-amber-500 w-4 h-4" /><span class="text-xs text-slate-300">Yes, ABC license.</span></label>
                                    <label class="flex items-center gap-3 cursor-pointer"><input required type="radio" name="alcohol" value="NO" checked={formData.alcohol === 'NO'} onChange={handleChange} class="accent-amber-500 w-4 h-4" /><span class="text-xs text-slate-300">No alcohol allowed.</span></label>
                                </div>
                                <div class="border-t border-slate-800 pt-4">
                                    <label class="text-[9px] uppercase font-bold text-slate-500 mb-2 block">Will you be providing Hookah? *</label>
                                    <label class="flex items-center gap-3 cursor-pointer mb-2"><input required type="radio" name="hookah" value="YES" checked={formData.hookah === 'YES'} onChange={handleChange} class="accent-amber-500 w-4 h-4" /><span class="text-xs text-slate-300">Yes (I acknowledge $100.00 smoking fee)</span></label>
                                    <label class="flex items-center gap-3 cursor-pointer"><input required type="radio" name="hookah" value="NO" checked={formData.hookah === 'NO'} onChange={handleChange} class="accent-amber-500 w-4 h-4" /><span class="text-xs text-slate-300">No Hookah in building</span></label>
                                </div>
                                <div class="border-t border-slate-800 pt-4">
                                    <label class="flex items-start gap-3 cursor-pointer">
                                        <input required name="setup" type="checkbox" checked={formData.setup} onChange={handleChange} class="accent-amber-500 w-4 h-4 mt-1" />
                                        <span class="text-xs text-slate-300">Event Set Up * <br/>I understand I am responsible for putting together a team to set up my event.</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" disabled={isSaving} class="w-full py-5 bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl text-black font-black uppercase tracking-[0.2em] shadow-[0_0_20px_rgba(16,185,129,0.2)] hover:scale-[1.01] transition-transform flex items-center justify-center gap-3">
                            {isSaving ? <i class="fa-solid fa-circle-notch fa-spin text-xl"></i> : <i class="fa-solid fa-fingerprint text-xl"></i>}
                            {isSaving ? 'Encrypting to Firebase Vault...' : 'Capture Thumb-Sign & Write to Vault'}
                        </button>
                    </form>
                );
            };

            // --- MASTER HEADER ---
            const Header = () => (
                <header class="border-b border-white/10 bg-black/50 backdrop-blur-xl p-4 md:p-6 sticky top-0 z-50">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-amber-500 rounded-xl flex items-center justify-center shadow-[0_0_30px_rgba(245,158,11,0.3)]">
                                <i class="fa-solid fa-crown text-black text-3xl"></i>
                            </div>
                            <div>
                                <h1 class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter glow-text">GOINGS <span class="text-amber-500">OS</span></h1>
                            </div>
                        </div>

                        <div class="flex items-center gap-6">
                            <div class="bg-slate-900 border border-slate-800 rounded-xl p-2 flex items-center gap-2">
                                <i class="fa-solid fa-user-shield text-slate-500 ml-2"></i>
                                <select value={userRole} onChange={(e) => setUserRole(e.target.value)} class="bg-transparent text-xs font-black uppercase tracking-widest text-white outline-none cursor-pointer py-2 pl-2 pr-6">
                                    <option value="COMMANDER" class="text-black">Commander View (God Mode)</option>
                                    <option value="TENANT" class="text-black">Tenant View (Client)</option>
                                </select>
                            </div>

                            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col items-end shadow-inner hidden md:flex">
                                <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1">System Time</p>
                                <div class="flex items-baseline gap-1 font-mono text-amber-500">
                                    <span class="text-3xl font-black">{clock.main}</span>
                                    <span class="text-sm text-amber-500/50">:{clock.ms}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>
            );

            return (
                <div class="flex flex-col h-full overflow-hidden">
                    <Header />
                    <main class="flex-1 overflow-hidden">
                        <div class="p-6 grid grid-cols-1 xl:grid-cols-12 gap-6 animate-fadeIn h-full">
                            <div class="xl:col-span-3 space-y-4">
                                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Sovereign Pillars</h2>
                                <div onClick={() => setActivePillar('LAEC')} class={`p-5 rounded-2xl cursor-pointer border transition-all ${activePillar === 'LAEC' ? 'bg-amber-500/10 border-amber-500' : 'bg-slate-900 border-white/5'}`}>
                                    <div class="flex justify-between items-center mb-2"><i class={`fa-solid fa-building text-xl ${activePillar === 'LAEC' ? 'text-amber-500' : 'text-slate-500'}`}></i></div>
                                    <h3 class="font-black text-white uppercase text-sm">Luxury Affairs</h3>
                                    <p class="text-[10px] text-slate-400 mt-1 uppercase">HQ / Event Venue Intake</p>
                                </div>
                                <div class="p-5 rounded-2xl border bg-slate-900 border-white/5 opacity-50"><h3 class="font-black text-white uppercase text-sm">Keep It Goings</h3></div>
                                <div class="p-5 rounded-2xl border bg-slate-900 border-white/5 opacity-50"><h3 class="font-black text-white uppercase text-sm">Choice Inc.</h3></div>
                                <div class="p-5 rounded-2xl border bg-slate-900 border-white/5 opacity-50"><h3 class="font-black text-white uppercase text-sm">TBE Tax Shield</h3></div>
                            </div>
                            <div class="xl:col-span-9 bg-slate-900/50 border border-white/5 rounded-[2rem] p-8 relative overflow-hidden h-full">
                                {activePillar === 'LAEC' ? <LAECForm /> : <div class="flex items-center justify-center h-full text-slate-500 uppercase font-black tracking-widest">Awaiting Module</div>}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
